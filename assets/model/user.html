<form id="formulario-registro">
    <input type="text" id="ins-nombre" placeholder="Nombre completo" required>
    <input type="number" id="ins-edad" placeholder="Edad" required>
    <input type="text" id="ins-cedula" placeholder="Cédula/DNI" required>
    <input type="tel" id="ins-telefono" placeholder="Teléfono" required>
    <input type="email" id="ins-correo" placeholder="Correo electrónico" required>
    
    <button type="submit">Guardar Usuario</button>
</form>
